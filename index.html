<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="가입 없이 로컬 브라우저에서 사용하는 우리 반 수행평가 캘린더 ClassMap"
    />
    <title>ClassMap</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const isGitHubPages =
        location.hostname === "chabin0000.github.io" &&
        location.pathname.startsWith("/Suhang-Moa/");

      if (isGitHubPages) {
        const style = document.createElement("link");
        style.rel = "stylesheet";
        style.href = "/Suhang-Moa/assets/main.css";
        document.head.appendChild(style);

        const script = document.createElement("script");
        script.type = "module";
        script.src = "/Suhang-Moa/assets/app.js";
        document.body.appendChild(script);
      } else {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "/src/main.tsx";
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
